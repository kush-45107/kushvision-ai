<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KushVision AI Image</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='image.css') }}">
</head>

<body>
    <div class="container">
        <h1>KushVision AI</h1>
        <div class="box">
            <form method="POST">
                <textarea id="image_prompt" name="image_prompt" placeholder="Describe your image..."></textarea>

                <select name="style" style="margin-top:10px; padding:8px; border-radius:6px;">
                    <option value="realistic">Realistic</option>
                    <option value="anime">Anime</option>
                    <option value="cinematic">Cinematic</option>
                    <option value="fantasy">Fantasy</option>
                    <option value="cartoon">Cartoon</option>
                    <option value="cyberpunk">Cyberpunk</option>
                </select>

                <div class="buttons">
                    <button type="button" onclick="startVoice('image_prompt')">Speak</button>
                    <button type="submit">Generate</button>
                </div>
            </form>

            {% if image %}
            <div class="image-box">
                <img src="{{ image }}">
                <a href="{{ image }}" download="KushVision_AI_Image.png" class="download-link">
                    <button type="button" class="download-btn">
                        Download Image
                    </button>
                </a>
            </div>
            {% endif %}
            <a class="back-link" href="/dashboard/{{username}}">← Back</a>
        </div>
    </div>

    <script>
        function startVoice(id) {
            if (!('webkitSpeechRecognition' in window)) {
                alert("Use Chrome browser");
                return;
            }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = "en-IN";
            recognition.start();
            recognition.onresult = function (event) {
                document.getElementById(id).value =
                    event.results[0][0].transcript;
            };
        }
    </script>

    <audio id="clickSound" preload="auto">
        <source src="{{ url_for('static', filename='click.mp3') }}" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const sound = document.getElementById("clickSound");
            function playClick() {
                sound.pause();
                sound.currentTime = 0;
                sound.play().catch(() => { });
            }
            document.querySelectorAll("button").forEach(btn => {
                btn.addEventListener("click", function (e) {
                    if (btn.type === "submit") {
                        e.preventDefault();
                        playClick();
                        setTimeout(() => {
                            btn.closest("form").submit();
                        }, 120);
                    } else {
                        playClick();

                    }
                });
            });

            document.querySelectorAll("a:not(.download-link)").forEach(link => {
                link.addEventListener("click", function (e) {
                    const href = this.getAttribute("href");
                    if (!href || href.startsWith("#")) return;
                    e.preventDefault();
                    playClick();
                    setTimeout(() => {
                        window.location.href = href;
                    }, 120);
                });
            });
        });
    </script>
</body>
</html>
